<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="settings.css">
    <script src="settings.js"></script>
</head>
<body>
    <h1>LeetCode Snippets:</h1>
    <button id="addSnippetButton">Add Snippet</button>

    <div id="snippetList"></div>
    <dialog id="snippetDialog">
        <h2>Add Snippet</h2>

        <label>
            ShortCut
            <input id="shortcut">
        </label>

        <label>
            Name
            <input id = "name">
        </label>

        <label>
            Snippet
            <textarea id="body"></textarea>
        </label>
         <button id="saveSnippet">
        Save
    </button>
    </dialog>
</body>
</html>
